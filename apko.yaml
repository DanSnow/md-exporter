contents:
  keyring:
    - keys/alpine-58199dcc.rsa.pub
    - keys/alpine-616ae350.rsa.pub
    - melange.rsa.pub
  repositories:
    - https://dl-cdn.alpinelinux.org/alpine/edge/main
    - https://dl-cdn.alpinelinux.org/alpine/edge/community
  packages:
    - musl
    - libgcc
    - zlib
    - gmp
    - libffi
    - libssl3
    - libcrypto3
    - dumb-init
    - pandoc-cli
    - typst
    - md-export

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: 65532

paths:
  - path: /tmp
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0755

environment:
  TYPST_TEMPLATE: /app/templates/default.typ
  REFERENCE_DOCX: /app/templates/reference.docx
  LUA_FILTER: /app/filters/table-auto-width.lua

entrypoint:
  command: /usr/bin/dumb-init --

cmd: /usr/bin/md-export
